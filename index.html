<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PIX</title>

<style>
body{
  background:#ffffff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  text-align:center;
  border:1px solid #ddd;
  padding:30px;
  border-radius:20px;
  width:300px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
}

button{
  margin-top:15px;
  background:#f50707;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>Pagamento via PIX</h2>

  <input
    type="text"
    value="SUA CHAVE PIX"
    id="pix"
    readonly
  >

  <button onclick="copiarPix()">
    COPIAR PIX
  </button>

  <p id="msg"></p>
</div>

<script>
function copiarPix(){
  let pix = document.getElementById("pix");

  navigator.clipboard.writeText(pix.value);

  document.getElementById("msg").innerHTML =
  "PIX copiado!";
}
</script>

</body>
</html>
